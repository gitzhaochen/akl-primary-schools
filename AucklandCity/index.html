<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auckland City Primary Schools</title>
<style>
  :root {
    --bg: #f5f7fa;
    --card: #ffffff;
    --accent: #1a3a5c;
    --accent-light: #2a5a8c;
    --text: #2c3e50;
    --text-muted: #6b7c93;
    --border: #e2e8f0;
    --shadow: 0 2px 12px rgba(0,0,0,.06);
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    color: #fff;
    padding: 48px 24px 40px;
    text-align: center;
  }
  header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -.02em; }
  header p { margin-top: 8px; opacity: .85; font-size: .95rem; }

  .toolbar {
    margin: 24px 24px 0;
    padding: 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar input {
    flex: 1;
    min-width: 200px;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: .95rem;
    outline: none;
    transition: border-color .2s;
  }
  .toolbar input:focus { border-color: var(--accent-light); }
  .toolbar .count-badge {
    font-size: .85rem;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .toolbar button {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card);
    cursor: pointer;
    font-size: .85rem;
  }

  .grid {
    margin: 24px 24px 60px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .school-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow .2s;
  }
  .school-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,.1); }

  .card-header {
    background: var(--accent);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .card-header h2 { font-size: 1.15rem; font-weight: 600; }
  .card-header .toggle {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: rgba(255,255,255,.15);
    transition: transform .3s;
    flex-shrink: 0;
  }
  .card-header .toggle svg { fill: #fff; width: 14px; height: 14px; }
  .school-card.collapsed .card-header .toggle { transform: rotate(-90deg); }

  .card-body {
    display: grid;
    grid-template-columns: 40% 60%;
    gap: 0;
    overflow: hidden;
    max-height: 2000px;
    transition: max-height .4s ease;
  }
  .school-card.collapsed .card-body { max-height: 0; }

  .card-section { padding: 20px 24px; }
  .card-section:first-child { border-right: 1px solid var(--border); }
  .card-section h3 {
    font-size: .8rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .card-section img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .card-section .source {
    margin-top: 8px;
    font-size: .75rem;
    color: var(--text-muted);
  }
  .card-section .source a {
    color: var(--accent-light);
    text-decoration: none;
  }
  .card-section .source a:hover { text-decoration: underline; }

  @media (max-width: 768px) {
    .card-body { grid-template-columns: 1fr; }
    .card-section:first-child { border-right: none; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Auckland City Primary Schools</h1>
  <p>学校统计数据与学生人口一览 · 共 6 所学校</p>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="搜索学校名称…" autocomplete="off">
  <span class="count-badge" id="countBadge">显示 6 / 6</span>
  <button onclick="toggleAll(true)">全部展开</button>
  <button onclick="toggleAll(false)">全部折叠</button>
</div>

<div class="grid" id="grid"></div>

<script>
const schools = [
  { name: "Mount Eden Normal School", folder: "MtEdenNormalSchool", id: 1378 },
  { name: "Cornwall Park District School", folder: "CornwallParkDistrictSchool", id: 1256 },
  { name: "Remuera School", folder: "RemueraSchool", id: 1462 },
  { name: "Meadowbank School", folder: "MeadowbankSchool", id: 1370 },
  { name: "Victoria Avenue School", folder: "VictoriaAvenueSchool", id: 1544 },
  { name: "Newton Central School", folder: "NewtonCentralSchool", id: 1392 },
];

const grid = document.getElementById('grid');
const search = document.getElementById('search');
const badge = document.getElementById('countBadge');

function renderCards() {
  grid.innerHTML = '';
  const q = search.value.toLowerCase();
  const filtered = schools.filter(s => s.name.toLowerCase().includes(q));

  filtered.forEach(s => {
    const card = document.createElement('div');
    card.className = 'school-card';
    card.innerHTML = `
      <div class="card-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <h2>${s.name}</h2>
        <span class="toggle"><svg viewBox="0 0 12 12"><path d="M2 4l4 4 4-4"/></svg></span>
      </div>
      <div class="card-body">
        <div class="card-section">
          <h3>School Count · 学校统计</h3>
          <img src="./${s.folder}/count.png" alt="${s.name} Count" loading="lazy">
          <div class="source">数据来源 <a href="https://education.syncrat.com/education/school/${s.id}" target="_blank">education.syncrat.com</a></div>
        </div>
        <div class="card-section">
          <h3>Student Population · 学生人口</h3>
          <img src="./${s.folder}/population.png" alt="${s.name} Population" loading="lazy">
          <div class="source">数据来源 <a href="https://www.educationcounts.govt.nz/find-school/school/population/year?school=${s.id}" target="_blank">educationcounts.govt.nz</a></div>
        </div>
      </div>`;
    grid.appendChild(card);
  });

  badge.textContent = `显示 ${filtered.length} / ${schools.length}`;
}

function toggleAll(expand) {
  document.querySelectorAll('.school-card').forEach(c => {
    c.classList.toggle('collapsed', !expand);
  });
}

search.addEventListener('input', renderCards);
renderCards();
</script>

</body>
</html>
